<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASST | MHWilds Simulation Tool</title>
    <link rel="icon" href="icon/title.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --color-bg: #0a0a0c;
            --color-surface: #141418;
            --color-border: #2a2a30;
            --color-primary: #3399ff;
            --color-secondary: #224466;
            --color-accent: #ffcc00;
            --color-text: #e0e0e0;
            --color-text-muted: #888890;
            --font-main: 'Outfit', sans-serif;
            --font-serif: 'Noto Serif JP', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .search-status {
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        #status-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--color-primary);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--color-primary);
        }

        .input-group {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .result-card {
            background: var(--color-surface);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: var(--color-primary);
        }

        .result-header {
            padding: 1rem 1.5rem;
            background: rgba(51, 153, 255, 0.1);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .defense-info {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        .result-body {
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .result-body {
                grid-template-columns: 1fr;
            }
        }

        .armor-list {
            list-style: none;
        }

        .armor-item {
            margin-bottom: 1rem;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.8rem;
        }

        .armor-item:last-child {
            border-bottom: none;
        }

        .armor-main {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .armor-part {
            color: var(--color-primary);
            font-weight: 600;
            width: 40px;
            flex-shrink: 0;
        }

        .armor-name {
            flex: 1;
            color: #fff;
            font-weight: bold;
        }

        .armor-stats {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-bottom: 4px;
            padding-left: 40px;
        }

        .stat-val {
            font-family: var(--font-serif);
            font-weight: bold;
            color: #fff; /* 全て白に変更 */
            font-variant-numeric: tabular-nums;
        }

        /* 武器装飾品ピッカー */
        .weapon-deco-picker {
            padding: 4px 8px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .weapon-deco-picker:hover {
            border-color: var(--color-accent);
            background: #1a1a1a;
        }
        
        /* ピッカー用モーダル */
        #deco-picker-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            max-height: 80vh;
            background: #111;
            border: 1px solid var(--color-accent);
            z-index: 9999;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }
        #deco-picker-header {
            padding: 10px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #deco-picker-search {
            width: 100%;
            padding: 6px 10px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            font-size: 0.8rem;
            outline: none;
        }
        #deco-picker-list {
            overflow-y: auto;
            flex: 1;
        }
        .deco-pick-item {
            padding: 8px 12px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            font-size: 0.8rem;
            color: #ccc;
        }
        .deco-pick-item:hover {
            background: #222;
            color: #fff;
        }
        .deco-pick-item.none {
            color: #777;
            font-style: italic;
        }
        #deco-picker-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9998;
            display: none;
        }

        /* 耐性フィルター行 */
        .res-filter-row {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #111;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        .res-filter-row span {
            font-size: 0.65rem;
            flex: 1;
        }
        .res-filter-row input {
            width: 40px;
            height: 20px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            font-size: 0.75rem;
            text-align: center;
        }
        .res-filter-remove {
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0 4px;
        }

        .skill-summary {
            overflow-x: auto;
        }

        .skill-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: var(--color-text);
            font-variant-numeric: tabular-nums;
        }

        .skill-table th {
            text-align: center;
            padding: 4px 2px;
            border-bottom: 2px solid var(--color-border);
            color: var(--color-primary);
            font-weight: 600;
            white-space: nowrap;
        }

        .skill-table td {
            text-align: center;
            padding: 6px 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skill-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .skill-table td:first-child {
            text-align: left;
            color: #fff;
            font-weight: bold;
            min-width: 80px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .skill-table .total-cell {
            color: var(--color-accent);
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }

        .skill-table .val-cell {
            width: 30px;
        }

        .skill-table .empty-cell {
            color: var(--color-text-muted);
            opacity: 0.2;
        }

        .piece-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding-left: 40px;
        }

        .piece-skill-label {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text);
            padding: 0px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .special-skill-label {
            color: var(--color-accent);
            font-size: 0.7rem;
            margin-right: 4px;
        }

        .decoration-list {
            font-size: 0.75rem;
            color: #3399ff;
            margin-top: 4px;
            padding-left: 40px;
        }

        .target-skill-badge {
            background: rgba(51, 153, 255, 0.15); 
            border: 1px solid rgba(51, 153, 255, 0.3); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            color: #fff; 
            margin-right: 0.5rem; 
            display: inline-block; 
            margin-bottom: 0.3rem;
            font-variant-numeric: tabular-nums;
        }

        .skill-summary-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
        }

        .btn {
            background: var(--color-secondary);
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--color-primary);
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .deco-label {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-accent);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.3rem;
            display: inline-block;
            margin-top: 0.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--color-text-muted);
        }

        /* Skill Selection Panel Styles from index.html */
        .skills-panel {
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .panel-title {
            font-size: 1.2rem;
            color: var(--color-primary);
            border-bottom: 1px solid rgba(51, 153, 255, 0.3);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            font-family: var(--font-serif);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #skills-selection-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem 1rem;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 0.8rem;
            scrollbar-width: thin;
            scrollbar-color: var(--color-primary) transparent;
        }

        #skills-selection-list::-webkit-scrollbar {
            width: 6px;
        }

        #skills-selection-list::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 10px;
        }

        .skill-category-title {
            grid-column: 1 / -1;
            font-size: 0.85rem;
            color: var(--color-primary);
            background: rgba(51, 153, 255, 0.1);
            padding: 0.4rem 0.8rem;
            margin: 0.8rem 0 0.4rem 0;
            border-left: 3px solid var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .skill-subcategory-title {
            grid-column: 1 / -1;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin: 1rem 0 0.4rem 0;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .skill-selector-row {
            display: grid;
            grid-template-columns: 1fr 60px;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .skill-selector-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .skill-selector-row.selected {
            background: rgba(51, 153, 255, 0.1);
            border-color: rgba(51, 153, 255, 0.4);
        }

        .skill-selector-row.selected .skill-name {
            color: var(--color-primary);
            font-weight: bold;
        }

        .skill-name {
            font-weight: 500;
            font-size: 0.8rem;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skill-selector-row select {
            padding: 0.2rem;
            font-size: 0.75rem;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            border-radius: 3px;
            outline: none;
        }

        .skill-search-container {
            margin-bottom: 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--color-surface);
            padding: 0.5rem 0;
        }

        #skill-search-input {
            width: 100%;
            padding: 0.6rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--color-border);
            color: #fff;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }

        #active-skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
            min-height: 20px;
        }

        .active-skill-badge {
            background: rgba(51, 153, 255, 0.15);
            border: 1px solid rgba(51, 153, 255, 0.4);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav container">
            <a href="index.html" class="logo-link">
                <img src="icon/title.png" alt="ASST" class="site-logo">
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">ダメージ計算</a>
                <a href="asst.html" class="nav-link active">ASST</a>
                <a href="damage_talisman.html" class="nav-link">お守り検索</a>
                <a href="talisman.html" class="nav-link">お守りリスト</a>
                <a href="database.html" class="nav-link">データベース</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="search-status" style="flex-direction: column; align-items: stretch; gap: 1rem;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 0.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border);">
                <!-- Weapon Settings -->
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                        <label style="font-size: 0.75rem; color: var(--color-primary); font-weight: bold;">武器設定</label>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                        <div style="display: flex; gap: 0.4rem; align-items: center;">
                            <label style="font-size: 0.65rem; color: var(--color-text-muted); width: 45px;">シリーズ</label>
                            <select id="weapon-ss" style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;"><option value="">自動選択</option></select>
                        </div>
                        <div style="display: flex; gap: 0.4rem; align-items: center;">
                            <label style="font-size: 0.65rem; color: var(--color-text-muted); width: 45px;">グループ</label>
                            <select id="weapon-gs" style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;"><option value="">自動選択</option></select>
                        </div>
                        <div style="margin-top: 4px; border-top: 1px dashed #333; padding-top: 8px;">
                            <label style="font-size: 0.7rem; color: var(--color-accent); font-weight: bold; display: block; margin-bottom: 4px;">武器装飾品 [3] [3] [3]</label>
                            <div style="display: flex; flex-direction: column; gap: 4px;">
                                <div class="weapon-deco-picker" id="wdeco-1" data-slot="1">未選択</div>
                                <div class="weapon-deco-picker" id="wdeco-2" data-slot="2">未選択</div>
                                <div class="weapon-deco-picker" id="wdeco-3" data-slot="3">未選択</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Talisman Settings -->
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                        <label style="font-size: 0.75rem; color: var(--color-primary); font-weight: bold;">お守り設定</label>
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <input type="checkbox" id="talisman-auto" checked>
                            <label for="talisman-auto" style="font-size: 0.7rem; color: var(--color-accent); cursor: pointer;">自動選択</label>
                        </div>
                    </div>
                    <div id="talisman-selector-ui" style="display: flex; flex-direction: column; gap: 0.4rem; opacity: 0.5; pointer-events: none;">
                        <div style="display: flex; gap: 0.4rem;">
                            <select id="talisman-rare" style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                                <option value="any">全レア度</option>
                                <option value="5">RARE 5</option>
                                <option value="6">RARE 6</option>
                                <option value="7">RARE 7</option>
                                <option value="8">RARE 8</option>
                            </select>
                            <select id="talisman-slot-select" style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                                <option value="any">スロット指定</option>
                            </select>
                        </div>
                        <select id="talisman-skill-1" style="width: 100%; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.75rem;"><option value="any">第1スキル：指定なし</option></select>
                        <select id="talisman-skill-2" style="width: 100%; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.75rem;"><option value="any">第2スキル：指定なし</option></select>
                        <select id="talisman-skill-3" style="width: 100%; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.75rem;"><option value="any">第3スキル：指定なし</option></select>
                    </div>
                </div>

                <!-- Combined Filters & Sort -->
                <div class="input-group">
                    <label style="font-size: 0.75rem; color: var(--color-primary); font-weight: bold; margin-bottom: 0.5rem; display: block;">詳細フィルター & ソート</label>
                    <div style="margin-bottom: 0.8rem;">
                        <label style="font-size: 0.65rem; color: var(--color-accent); display: block; margin-bottom: 4px;">ソート条件</label>
                        <select id="search-sort-type" style="width: 100%; height: 28px; background: #222; color: #fff; border: 1px solid #444; font-size: 0.75rem; border-radius: 4px;">
                            <option value="def">防御力順 (降順)</option>
                            <option value="res0">火耐性順 (降順)</option>
                            <option value="res1">水耐性順 (降順)</option>
                            <option value="res2">雷耐性順 (降順)</option>
                            <option value="res3">氷耐性順 (降順)</option>
                            <option value="res4">龍耐性順 (降順)</option>
                        </select>
                    </div>

                    <div id="res-filter-controls">
                        <label style="font-size: 0.65rem; color: var(--color-accent); display: block; margin-bottom: 4px;">必要な属性耐性値</label>
                        <div id="active-res-filters" style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px;">
                            <!-- Dynamic filter rows -->
                        </div>
                        <select id="add-res-filter" style="width: 100%; height: 24px; background: #111; color: #aaa; border: 1px solid #333; font-size: 0.65rem; cursor: pointer;">
                            <option value="">＋ フィルターを追加...</option>
                            <option value="0">火耐性</option>
                            <option value="1">水耐性</option>
                            <option value="2">雷耐性</option>
                            <option value="3">氷耐性</option>
                            <option value="4">龍耐性</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button id="btn-re-search" class="btn" style="width: 100%; height: 60px; border: 1px solid var(--color-accent); color: var(--color-accent); background: transparent;">設定を反映して再検索</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="status-info">
                    <div id="status-text"><span class="loader"></span>検索対象の条件を確認中...</div>
                    <div class="progress-bar-container">
                        <div id="progress-bar"></div>
                    </div>
                </div>
                <div id="result-count" style="margin-left: 2rem; font-weight: bold; font-size: 1.2rem; color: var(--color-primary);">
                    0 sets
                </div>
            </div>
            <div id="target-summary" style="margin-top: 1rem; border-top: 1px dotted rgba(255,255,255,0.1); padding-top: 0.8rem; display: flex; flex-wrap: wrap;">
                <!-- スキル一覧がここに表示されます -->
            </div>
        </div>

        <!-- Skill Selection Panel -->
        <section class="skills-panel">
            <h2 class="panel-title">目標スキル設定</h2>
            
            <div id="active-skills-container" style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border);">
                <div style="font-size: 0.85rem; font-weight: bold; color: var(--color-primary); margin-bottom: 0.5rem; display: flex; justify-content: space-between;">
                    <span>選択中のスキル</span>
                    <button id="btn-clear-skills" style="background: transparent; border: 1px solid rgba(255,0,0,0.3); color: #ff6666; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; cursor: pointer;">クリア</button>
                </div>
                <div id="active-skills-list"></div>
            </div>

            <div class="skill-search-container">
                <input type="text" id="skill-search-input" placeholder="スキル名称で検索...">
            </div>

            <div id="skills-selection-list"></div>
        </section>

        <div id="results-container" class="results-grid">
            <!-- 結果がここに動的に生成されます -->
        </div>

        <div id="empty-message" class="empty-state" style="display: none;">
            <p>指定されたスキル構成を満たす組み合わせは見つかりませんでした。</p>
            <p style="font-size: 0.8rem; margin-top: 1rem;">スキルのレベルを下げるか、お守りの条件を緩和して再検索してください。</p>
        </div>
    </div>

    <!-- 武器装飾品ピッカー用モーダル -->
    <div id="deco-picker-overlay"></div>
    <div id="deco-picker-modal">
        <div id="deco-picker-header">
            <div style="font-size: 0.85rem; color: var(--color-primary); font-weight: bold;">装飾品を選択 (スロット[3]以下)</div>
            <input type="text" id="deco-picker-search" placeholder="スキル名で検索...">
        </div>
        <div id="deco-picker-list">
            <!-- JSで動的に生成 -->
        </div>
        <div style="padding: 10px; border-top: 1px solid #333; text-align: right;">
            <button class="btn" id="deco-picker-close" style="padding: 4px 12px; font-size: 0.7rem;">閉じる</button>
        </div>
    </div>

    <script type="module" src="js/asst.js"></script>
</body>
</html>
